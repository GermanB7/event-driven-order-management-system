spring.application.name=event-driven-order-management-system

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/order_management}
spring.datasource.username=${DB_USER:order_user}
spring.datasource.password=${DB_PASSWORD:order_pass}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

outbox.relay.enabled=true
outbox.relay.poll-interval-ms=5000
outbox.relay.batch-size=50
outbox.relay.retry-delay=PT30S
outbox.kafka.enabled=true
outbox.kafka.topic.order-events=order-events
outbox.kafka.publish-timeout=PT5S

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

